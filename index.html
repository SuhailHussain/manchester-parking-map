<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>Manchester Parking</title>
    <!-- Parking P emoji favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🅿</text></svg>" />
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.css" />
  </head>
  <body>
    <div id="app">
      <div id="map" role="application" aria-label="Manchester parking zone map"></div>

      <!-- Legend — top-right -->
      <div id="legend" role="note" aria-label="Map legend">
        <div class="legend-item"><span class="dot green" aria-hidden="true"></span>Free</div>
        <div class="legend-item"><span class="dot amber" aria-hidden="true"></span>Paid</div>
        <div class="legend-item"><span class="dot grey" aria-hidden="true"></span>Over limit</div>
      </div>

      <!-- Bottom sheet -->
      <div id="filter-panel" role="complementary" aria-label="Parking filters">

        <!-- Handle bar + summary — always visible, acts as toggle on mobile -->
        <div id="sheet-handle"
             role="button"
             tabindex="0"
             aria-expanded="false"
             aria-controls="sheet-body"
             aria-label="Show parking filters">
          <div id="handle-pill" aria-hidden="true"></div>
          <div id="sheet-summary">
            <span id="current-status" aria-live="polite" aria-atomic="true"></span>
            <button id="locate-btn" aria-label="Centre map on my location" title="My location">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
                <circle cx="12" cy="12" r="8"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Collapsible filters -->
        <div id="sheet-body" aria-hidden="true">
          <div id="sheet-body-inner">

            <div class="filter-row">
              <span id="when-label" class="filter-label">When</span>
              <div id="time-controls" role="group" aria-labelledby="when-label">
                <button id="now-btn" class="seg-btn active" aria-pressed="true">Right now</button>
                <div id="custom-time" hidden>
                  <input type="date" id="date-input" aria-label="Date" />
                  <input type="time" id="time-input" aria-label="Time" />
                </div>
              </div>
            </div>

            <div class="filter-row">
              <span id="cost-label" class="filter-label">Max cost</span>
              <div class="btn-group" role="group" aria-labelledby="cost-label">
                <button data-value="0"  class="seg-btn cost-btn"        aria-pressed="false">Free</button>
                <button data-value="2"  class="seg-btn cost-btn"        aria-pressed="false">£2</button>
                <button data-value="5"  class="seg-btn cost-btn"        aria-pressed="false">£5</button>
                <button data-value=""   class="seg-btn cost-btn active" aria-pressed="true">Any</button>
              </div>
            </div>

            <div class="filter-row">
              <span id="dur-label" class="filter-label">Duration</span>
              <div class="btn-group" role="group" aria-labelledby="dur-label">
                <button data-value="30"  class="seg-btn dur-btn"        aria-pressed="false">30m</button>
                <button data-value="60"  class="seg-btn dur-btn active" aria-pressed="true">1 hr</button>
                <button data-value="120" class="seg-btn dur-btn"        aria-pressed="false">2 hr</button>
                <button data-value="180" class="seg-btn dur-btn"        aria-pressed="false">3 hr</button>
              </div>
            </div>

          </div><!-- /sheet-body-inner -->
        </div><!-- /sheet-body -->

      </div><!-- /filter-panel -->
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
